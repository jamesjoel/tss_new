<html>
<head>
    <title>CSS 5</title>
    <style>
        #box{
            height: 200px;
            width: 200px;
            background-color: #5ACED1;

            border-top : 10px solid red;
            border-bottom : 10px solid red;
            border-left : 10px solid blue;
            border-right : 10px solid blue;

        }
        #box2{
            height: 200px;
            width : 200px;
            background-color: #9933AC;

            border-radius: 50px 0px 50px 0px;
        }
    </style>
</head> 
<body>
    <div id="box"></div>
    <div id="box2"></div>
</body>
</html>
