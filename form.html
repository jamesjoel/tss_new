<html>
<head>
    <title>Demo Page</title>
</head>
<body>
    <form>
        <table align="center" border="1" cellspacing="0" cellpadding="10">
            <tr>
                <td colspan="2" align="center">
                    <b>Registration</b>
                </td>
            </tr>
            <tr>
                <td>Full Name</td>
                <td><input value="Rohit" placeholder="Full Name" type="text" /></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="Text" disabled="disabled" value="rohit@gmail.com" /></td>
            </tr>
            <tr>
                <Td>Password</Td>
                <td><input type="password" /></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    Male <input type="radio" name="gender"/>
                    Female <input checked="checked" type="radio" name="gender"/>
                </td>
            </tr>
            <tr>
                <td>Hobby</td>
                <td>
                    Cricket<input type="checkbox" />
                    Football<input checked="checked" type="checkbox" />
                    <br />
                    Music<input type="checkbox" />
                    Internet<input type="checkbox" />
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea placeholder="Address"></textarea></td>
            </tr>
            <tr>
                <td>City</td>
                <td>
                    <select>
                        <option>Select</option>
                        <option>Indore</option>
                        <option>Bhopal</option>
                        <option selected="selected">Mumbai</option>
                        <option>Pune</option>
                        <option>Delhi</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Select Image</td>
                <td><input type="file" /></td>
            </tr>
            <tr>
                <td><input type="button" value="OK"/></td>
                <td><input type="reset" value="Clear" /></td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Save" />
                </td>
            </tr>

            <input type="hidden" />

        </table>
    </form>
</body>
</html>
